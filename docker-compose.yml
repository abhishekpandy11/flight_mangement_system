version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Optional: Override inside docker
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      # If you add db later, include here
      - frontend # just for startup ordering, not strictly necessary

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
