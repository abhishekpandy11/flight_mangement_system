services:
  - type: web
    name: skyroute-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishDir: "build"
    rootDir: "frontend"
    envVars:
      - key: REACT_APP_API_URL
        value: https://flight-management-system.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
